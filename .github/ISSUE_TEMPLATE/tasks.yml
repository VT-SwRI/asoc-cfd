name: Task
description: Create a new task, bug report, or development item
title: "[TASK] "
labels: []
assignees: []

body:
  - type: textarea
    id: summary
    attributes:
      label: "Summary"
      description: "Briefly describe the issue, bug, or task."
      placeholder: |
        Example:
        - UART RX module drops bytes at high baud rates
        - Need Python script to parse ADC output packets

  - type: checkboxes
    id: area
    attributes:
      label: "🛠️ Area / Component"
      description: "Select all that apply."
      options:
        - label: "Verilog / HDL"
        - label: "Python"
        - label: "Testbench"
        - label: "Documentation"

  - type: textarea
    id: relevant_files
    attributes:
      label: "Relevant Files / Modules"
      description: "List any relevant files, modules, or directories."
      placeholder: |
        Example:
        - rtl/uart_rx.v
        - tb/uart_rx_tb.sv
        - scripts/parse_data.py

- type: textarea
  id: acceptance
  attributes:
    label: "Acceptance Criteria"
    description: "Edit the checklist below as needed."
    value: |
      - [ ] Module passes provided testbench
      - [ ] Python script produces correct CSV output
      - [ ] No simulation errors or warnings
  validations:
    required: false

  - type: textarea
    id: testing_notes
    attributes:
      label: "Testing Notes"
      description: "How should this be tested or verified?"
      placeholder: |
        - Simulation tool used (ModelSim, Verilator, etc.)
        - Python version
        - Hardware test (if any)
        
  - type: dropdown
    id: priority
    attributes:
      label: "Priority"
      options:
        - Low
        - Medium
        - High
        - Critical (blocking others)
    validations:
      required: true

  - type: textarea
    id: additional_notes
    attributes:
      label: "Additional Notes"
      description: "Anything else helpful (design assumptions, specs, screenshots, waveforms, etc.)"
